{% extends "panel_coordinador/panel_base.html" %}

{% load widget_tweaks %}

{% block panel_content %}
<div class="d-flex justify-content-center">
  <div class="col-lg-6 col-md-8 col-sm-10">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="card-title h4 fw-bold mb-4 text-primary">🏫 Nueva Aula</h2>

        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            {{ form.as_p }}
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              💾 Guardar
            </button>
            <a href="{% url 'lista_aulas' %}" class="btn btn-secondary">
              ❌ Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
/* Estilos para que form.as_p use clases de Bootstrap */
.card-body p {
  margin-bottom: 1rem;
}

.card-body label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 600;
}

.card-body input[type="text"],
.card-body input[type="number"],
.card-body input[type="email"],
.card-body select,
.card-body textarea {
  display: block;
  width: 100%;
  padding: 0.375rem 0.75rem;
  font-size: 1rem;
  font-weight: 400;
  line-height: 1.5;
  color: #212529;
  background-color: #fff;
  background-image: none;
  border: 1px solid #ced4da;
  border-radius: 0.375rem;
  transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
}

.card-body input:focus,
.card-body select:focus,
.card-body textarea:focus {
  color: #212529;
  background-color: #fff;
  border-color: #86b7fe;
  outline: 0;
  box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
}
</style>
{% endblock %}
