{% extends "panel_coordinador/panel_base.html" %}

{% block panel_content %}
<div class="container-lg">
  <!-- Título -->
  <h2 class="h3 fw-bold text-primary mb-4 d-flex align-items-center">
    📚 Niveles Educativos
  </h2>

  <!-- Botón: Nuevo Nivel -->
  <a href="{% url 'crear_nivel' %}" class="btn btn-primary mb-4">
    + Nuevo Nivel
  </a>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-striped table-bordered table-hover">
      <thead class="table-light">
        <tr>
          <th scope="col">Nombre</th>
          <th scope="col">Acciones</th>
        </tr>
      </thead>
      <tbody>
        {% for nivel in niveles %}
          <tr>
            <td>{{ nivel.nombre }}</td>
            <td>
              <a href="{% url 'editar_nivel' nivel.id %}" class="text-decoration-none text-primary me-2">Editar</a>
              |
              <a href="{% url 'eliminar_nivel' nivel.id %}" class="text-decoration-none text-danger ms-2" onclick="return confirm('¿Estás seguro de eliminar este nivel?');">Eliminar</a>
            </td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="2" class="text-center py-4 text-muted">No hay niveles registrados.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
