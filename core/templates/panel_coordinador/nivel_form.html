{% extends "panel_coordinador/panel_base.html" %}

{% block panel_content %}
<div class="d-flex justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="card-title h4 fw-bold text-primary mb-4 d-flex align-items-center gap-2">
          <span>📚</span> Nuevo Nivel Educativo
        </h2>

        <form method="post">
          {% csrf_token %}

          <!-- Campo Nombre -->
          <div class="mb-3">
            <label for="id_nombre" class="form-label fw-medium">Nombre:</label>
            <input
              type="text"
              name="nombre"
              id="id_nombre"
              value="{{ form.nombre.value|default_if_none:'' }}"
              class="form-control"
              required
            />
            {% if form.nombre.errors %}
              <div class="text-danger small mt-1">{{ form.nombre.errors.0 }}</div>
            {% endif %}
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              💾 Guardar
            </button>
            <a href="{% url 'lista_niveles' %}" class="btn btn-outline-danger">
              ❌ Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
