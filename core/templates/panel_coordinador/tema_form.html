{% extends "panel_coordinador/panel_base.html" %}
{% load widget_tweaks %}

{% block title %}Nuevo Tema{% endblock %}

{% block panel_content %}
<div class="d-flex justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="card-title h5 fw-bold text-primary d-flex align-items-center mb-4">
          🛠️ Nuevo Tema
        </h2>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label for="id_nombre" class="form-label fw-semibold">Nombre del Tema</label>
            {{ form.nombre|add_class:"form-control" }}
          </div>

          <div class="mb-3">
            <label for="id_asignatura" class="form-label fw-semibold">Asignatura</label>
            {{ form.asignatura|add_class:"form-select" }}
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
              💾 Guardar
            </button>
            <a href="{% url 'lista_temas' %}" class="btn btn-secondary">
              ❌ Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
