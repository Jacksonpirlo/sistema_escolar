{% extends "panel_coordinador/panel_base.html" %}

{% block panel_content %}
  <h1 class="mb-4">🎯 Lista de Temas</h1>

  <!-- Enlace para crear un nuevo tema -->
  <a href="{% url 'crear_tema' %}" class="btn btn-primary mb-4">Nuevo Tema</a>

  <!-- Tabla con efecto vidrio para mostrar todos los temas -->
  <div class="table-responsive">
    <table class="table">
      <thead>
        <tr>
          <th>NOMBRE DEL TEMA</th>
          <th>ASIGNATURA</th>
          <th>ACCIONES</th>
        </tr>
      </thead>
      <tbody>
        {% for tema in temas %}
          <tr>
            <td>{{ tema.nombre }}</td>
            <td>{{ tema.asignatura.nombre }}</td>
            <td>
              <a href="{% url 'editar_tema' tema.id %}" class="text-decoration-none text-primary me-2">Editar</a>
              |
              <a href="{% url 'eliminar_tema' tema.id %}" class="text-decoration-none text-danger ms-2">Eliminar</a>
            </td>
          </tr>
        {% empty %}
          <tr>
            <td colspan="3" class="text-center py-4 text-muted">No hay temas registrados.</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
